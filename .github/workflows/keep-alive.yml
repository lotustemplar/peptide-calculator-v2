name: Keep backend alive

on:
  schedule:
    # Runs every 5 minutes. Render free tier spins down after 15 min of inactivity;
    # pinging every 5 min keeps the service and its in-memory SQLite DB awake.
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          curl -sf https://peptide-calculator-v2-backend.onrender.com/health \
            && echo "Backend is up" \
            || echo "Backend did not respond (may be cold-starting)"
