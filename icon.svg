      <stop offset="0" stop-color="#1db4ff"/>
      <stop offset="1" stop-color="#0a4ecf"/>
    </linearGradient>
    <linearGradient id="shieldInner" x1="38" y1="28" x2="86" y2="92" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#d7ecff"/>
    </linearGradient>
    <linearGradient id="wingLeft" x1="14" y1="18" x2="55" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#92ef33"/>
